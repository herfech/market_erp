{% extends 'layout/base.html' %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow-lg">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Giriş Yap</h2>
                    <p class="text-muted small">Market ERP hesabınıza erişin</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Kullanıcı Adı</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="Kullanıcı adınızı girin" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium text-secondary">Şifre</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3 rounded-pill shadow-sm">
                        Oturum Aç
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p class="text-muted small">Henüz bir hesabınız yok mu? 
                        <a href="{% url 'signup' %}" class="text-primary fw-bold text-decoration-none">Hemen Kaydol</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control:focus {
        background-color: #fff !important;
        box-shadow: none;
        border-color: #6366f1;
    }
    .input-group-text {
        border-radius: 0.5rem 0 0 0.5rem;
    }
    .form-control {
        border-radius: 0 0.5rem 0.5rem 0;
        padding: 0.6rem 1rem;
    }
</style>
{% endblock %}
