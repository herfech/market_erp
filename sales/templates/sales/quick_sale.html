{% extends 'base.html' %}
{% block content %}
<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-desktop"></i> Satış Terminali</h5>
                    <span id="current-date" class="badge bg-secondary"></span>
                </div>
                <div class="card-body">
                    <div class="input-group input-group-lg mb-4">
                        <span class="input-group-text bg-white"><i class="fas fa-barcode"></i></span>
                        <input type="text" id="barcode-input" class="form-control shadow-none" 
                               placeholder="Barkod okutun veya ürün adı yazın..." autofocus>
                    </div>

                    <div class="table-responsive" style="min-height: 450px;">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Ürün</th>
                                    <th class="text-center">Fiyat</th>
                                    <th class="text-center" style="width: 140px;">Adet</th>
                                    <th class="text-end">Toplam</th>
                                    <th class="text-center"></th>
                                </tr>
                            </thead>
                            <tbody id="cart-items">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 bg-light">
                <div class="card-body p-4 text-center">
                    <h6 class="text-muted fw-bold">SATIŞ ÖZETİ</h6>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Toplam Adet:</span>
                        <span id="total-qty" class="fw-bold">0</span>
                    </div>
                    <div class="py-4">
                        <h5 class="text-muted mb-1">ÖDENECEK TUTAR</h5>
                        <h1 class="display-4 fw-bold text-primary" id="cart-total">0.00 TL</h1>
                    </div>
                    
                    <button class="btn btn-success btn-lg w-100 py-3 fw-bold" onclick="processSale()">
                        <i class="fas fa-print me-2"></i> SATIŞI TAMAMLA
                    </button>

                    <button class="btn btn-outline-danger btn-sm w-100 mt-4" onclick="resetCart()">
                        Sepeti Temizle
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let cart = [];

document.getElementById('barcode-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        const query = this.value;
        if (query.length > 0) {
            fetch(`/sales/api/product-search/?q=${query}`)
                .then(res => res.json())
                .then(data => {
                    if (data.products.length > 0) {
                        addToCart(data.products[0]);
                        this.value = '';
                    } else {
                        alert("Ürün bulunamadı!");
                    }
                });
        }
    }
});

function addToCart(product) {
    const existingProduct = cart.find(item => item.id === product.id);
    if (existingProduct) {
        existingProduct.qty += 1;
    } else {
        cart.push({
            id: product.id,
            name: product.name,
            price: parseFloat(product.price),
            qty: 1
        });
    }
    updateCartUI();
}

function updateQty(id, newQty) {
    const item = cart.find(i => i.id === id);
    if (item) {
        item.qty = parseInt(newQty) || 0;
        if (item.qty <= 0) removeFromCart(id);
    }
    updateCartUI();
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
}

function updateCartUI() {
    const tbody = document.getElementById('cart-items');
    tbody.innerHTML = '';
    let total = 0;
    let qtyCount = 0;

    cart.forEach(item => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        qtyCount += item.qty;

        tbody.innerHTML += `
            <tr>
                <td class="fw-bold">${item.name}</td>
                <td class="text-center">${item.price.toFixed(2)} TL</td>
                <td class="text-center">
                    <input type="number" class="form-control form-control-sm text-center mx-auto" 
                           style="width: 80px" value="${item.qty}" 
                           onchange="updateQty(${item.id}, this.value)">
                </td>
                <td class="text-end fw-bold">${subtotal.toFixed(2)} TL</td>
                <td class="text-center">
                    <button class="btn btn-sm text-danger" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-times"></i>
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById('cart-total').innerText = total.toFixed(2) + ' TL';
    document.getElementById('total-qty').innerText = qtyCount;
}

function processSale() {
    if (cart.length === 0) return;
    alert("Satış başarıyla gerçekleştirildi.");
    cart = [];
    updateCartUI();
}

function resetCart() {
    if (confirm("Sepeti boşaltmak istediğinize emin misiniz?")) {
        cart = [];
        updateCartUI();
    }
}

document.getElementById('current-date').innerText = new Date().toLocaleDateString('tr-TR');
</script>
{% endblock %}
